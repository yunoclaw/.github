<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap');
      
      @keyframes subtleGlow {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 1; }
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      .subtle-glow { animation: subtleGlow 4s ease-in-out infinite; }
      .fade-in { animation: fadeIn 1s ease-out forwards; }
      .delay-1 { animation-delay: 0.2s; opacity: 0; }
      .delay-2 { animation-delay: 0.4s; opacity: 0; }
      .delay-3 { animation-delay: 0.6s; opacity: 0; }
      .delay-4 { animation-delay: 0.8s; opacity: 0; }
      .delay-5 { animation-delay: 1s; opacity: 0; }
    </style>
    
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#0A1628"/>

  <!-- Title -->
  <text x="600" y="50" font-family="Plus Jakarta Sans, sans-serif" font-size="32" font-weight="700" fill="#F6F1E8" text-anchor="middle" class="fade-in">
    The YunoClaw Journey
  </text>

  <!-- Step 1: Your Intent -->
  <g class="fade-in delay-1">
    <rect x="350" y="100" width="500" height="90" rx="45" fill="#14B8A6" opacity="0.95" filter="url(#softGlow)" class="subtle-glow"/>
    <text x="600" y="135" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#0A1628" text-anchor="middle">
      🎯 Your Intent
    </text>
    <text x="600" y="165" font-family="Inter, sans-serif" font-size="15" fill="#0A1628" text-anchor="middle">
      "Wireless earbuds under $120, by Friday"
    </text>
  </g>

  <!-- Flow line 1 -->
  <line x1="600" y1="190" x2="600" y2="240" stroke="#14B8A6" stroke-width="3" opacity="0.7" class="fade-in delay-1"/>

  <!-- Step 2: Intent Engine -->
  <g class="fade-in delay-2">
    <rect x="300" y="240" width="600" height="110" rx="20" fill="#1E2D45" stroke="#14B8A6" stroke-width="2"/>
    <text x="600" y="275" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#14B8A6" text-anchor="middle">
      🧠 Intent Engine
    </text>
    <text x="600" y="305" font-family="Inter, sans-serif" font-size="14" fill="#B8AFA0" text-anchor="middle">
      Extracts: budget=$120 • deadline=Friday • category=earbuds
    </text>
    <text x="600" y="330" font-family="Inter, sans-serif" font-size="14" fill="#B8AFA0" text-anchor="middle">
      Maps to: Amazon, Best Buy, Target, Walmart
    </text>
  </g>

  <!-- Flow line 2 -->
  <line x1="600" y1="350" x2="600" y2="390" stroke="#14B8A6" stroke-width="3" opacity="0.7" class="fade-in delay-2"/>

  <!-- Step 3: Multi-Source Search -->
  <g class="fade-in delay-3">
    <rect x="200" y="390" width="800" height="130" rx="20" fill="#1E2D45" stroke="#F59E0B" stroke-width="2"/>
    <text x="600" y="425" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#F59E0B" text-anchor="middle">
      🔍 Multi-Source Search
    </text>
    
    <!-- Merchant boxes with 3D stack effect -->
    <g>
      <rect x="235" y="455" width="160" height="50" rx="12" fill="#B8E6E1" opacity="0.3"/>
      <rect x="230" y="450" width="160" height="50" rx="12" fill="#B8E6E1" opacity="0.5"/>
      <rect x="225" y="445" width="160" height="50" rx="12" fill="#B8E6E1" opacity="0.9"/>
      <text x="305" y="475" font-family="Inter, sans-serif" font-size="14" fill="#0A1628" text-anchor="middle" font-weight="600">Amazon</text>
      <text x="305" y="492" font-family="JetBrains Mono, monospace" font-size="12" fill="#0A1628" text-anchor="middle">15 items</text>
    </g>
    
    <g>
      <rect x="425" y="455" width="160" height="50" rx="12" fill="#B8E6E1" opacity="0.3"/>
      <rect x="420" y="450" width="160" height="50" rx="12" fill="#B8E6E1" opacity="0.5"/>
      <rect x="415" y="445" width="160" height="50" rx="12" fill="#B8E6E1" opacity="0.9"/>
      <text x="495" y="475" font-family="Inter, sans-serif" font-size="14" fill="#0A1628" text-anchor="middle" font-weight="600">Best Buy</text>
      <text x="495" y="492" font-family="JetBrains Mono, monospace" font-size="12" fill="#0A1628" text-anchor="middle">12 items</text>
    </g>
    
    <g>
      <rect x="615" y="455" width="160" height="50" rx="12" fill="#B8E6E1" opacity="0.3"/>
      <rect x="610" y="450" width="160" height="50" rx="12" fill="#B8E6E1" opacity="0.5"/>
      <rect x="605" y="445" width="160" height="50" rx="12" fill="#B8E6E1" opacity="0.9"/>
      <text x="685" y="475" font-family="Inter, sans-serif" font-size="14" fill="#0A1628" text-anchor="middle" font-weight="600">Target</text>
      <text x="685" y="492" font-family="JetBrains Mono, monospace" font-size="12" fill="#0A1628" text-anchor="middle">18 items</text>
    </g>
    
    <g>
      <rect x="805" y="455" width="160" height="50" rx="12" fill="#B8E6E1" opacity="0.3"/>
      <rect x="800" y="450" width="160" height="50" rx="12" fill="#B8E6E1" opacity="0.5"/>
      <rect x="795" y="445" width="160" height="50" rx="12" fill="#B8E6E1" opacity="0.9"/>
      <text x="875" y="475" font-family="Inter, sans-serif" font-size="14" fill="#0A1628" text-anchor="middle" font-weight="600">Walmart</text>
      <text x="875" y="492" font-family="JetBrains Mono, monospace" font-size="12" fill="#0A1628" text-anchor="middle">22 items</text>
    </g>
  </g>

  <!-- Flow line 3 -->
  <line x1="600" y1="520" x2="600" y2="560" stroke="#14B8A6" stroke-width="3" opacity="0.7" class="fade-in delay-3"/>

  <!-- Step 4: Constraint Filter -->
  <g class="fade-in delay-4">
    <rect x="250" y="560" width="700" height="100" rx="20" fill="#1E2D45" stroke="#14B8A6" stroke-width="2"/>
    <text x="600" y="595" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#14B8A6" text-anchor="middle">
      🛡️ Constraint Filter
    </text>
    <text x="600" y="625" font-family="Inter, sans-serif" font-size="14" fill="#B8AFA0" text-anchor="middle">
      67 products → Budget filter → Delivery filter → Trust filter → 14 matches
    </text>
    <text x="600" y="648" font-family="JetBrains Mono, monospace" font-size="12" fill="#059669" text-anchor="middle">
      ✓ All constraints satisfied
    </text>
  </g>

  <!-- Flow line 4 -->
  <line x1="600" y1="660" x2="600" y2="700" stroke="#14B8A6" stroke-width="3" opacity="0.7" class="fade-in delay-4"/>

  <!-- Step 5: Scoring & Results -->
  <g class="fade-in delay-5">
    <rect x="200" y="700" width="800" height="80" rx="40" fill="#F59E0B" opacity="0.95" filter="url(#softGlow)" class="subtle-glow"/>
    <text x="600" y="735" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#0A1628" text-anchor="middle">
      📊 Scoring Engine → ✅ Your Approval
    </text>
    <text x="600" y="762" font-family="Inter, sans-serif" font-size="15" fill="#0A1628" text-anchor="middle" font-weight="500">
      Nothing happens until you say yes
    </text>
  </g>
</svg>