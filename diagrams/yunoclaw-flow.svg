<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .line-anim {
        stroke-dasharray: 12 6;
        animation: dash 2s linear infinite;
      }
      .line-anim-slow {
        stroke-dasharray: 12 6;
        animation: dash 3s linear infinite;
      }
      @keyframes dash {
        to { stroke-dashoffset: -36; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="#0A1628"/>

  <!-- Title -->
  <text x="600" y="52" font-family="sans-serif" font-size="30" font-weight="700" fill="#F6F1E8" text-anchor="middle">The YunoClaw Journey</text>

  <!-- Step 1: Intent -->
  <rect x="340" y="80" width="520" height="88" rx="44" fill="#14B8A6"/>
  <text x="600" y="116" font-family="sans-serif" font-size="20" font-weight="700" fill="#0A1628" text-anchor="middle">Your Intent</text>
  <text x="600" y="148" font-family="sans-serif" font-size="15" fill="#0A1628" text-anchor="middle">"Wireless earbuds under $120, delivered by Friday"</text>

  <!-- Animated connector 1 -->
  <line x1="600" y1="168" x2="600" y2="214" stroke="#14B8A6" stroke-width="3" class="line-anim"/>

  <!-- Step 2: Intent Engine -->
  <rect x="280" y="214" width="640" height="108" rx="18" fill="#1E2D45" stroke="#14B8A6" stroke-width="2"/>
  <text x="600" y="252" font-family="sans-serif" font-size="18" font-weight="700" fill="#14B8A6" text-anchor="middle">Intent Engine</text>
  <text x="600" y="282" font-family="sans-serif" font-size="14" fill="#B8AFA0" text-anchor="middle">Extracts: budget=$120  |  deadline=Friday  |  category=earbuds</text>
  <text x="600" y="306" font-family="sans-serif" font-size="14" fill="#B8AFA0" text-anchor="middle">Maps to: Amazon, Best Buy, Target, Walmart</text>

  <!-- Animated connector 2 -->
  <line x1="600" y1="322" x2="600" y2="368" stroke="#F59E0B" stroke-width="3" class="line-anim"/>

  <!-- Step 3: Multi-Source Search -->
  <rect x="180" y="368" width="840" height="148" rx="18" fill="#1E2D45" stroke="#F59E0B" stroke-width="2"/>
  <text x="600" y="406" font-family="sans-serif" font-size="18" font-weight="700" fill="#F59E0B" text-anchor="middle">Multi-Source Search — runs in parallel</text>

  <!-- Merchant cards with stack effect -->
  <rect x="210" y="428" width="168" height="58" rx="12" fill="#B8E6E1" opacity="0.2"/>
  <rect x="206" y="424" width="168" height="58" rx="12" fill="#B8E6E1" opacity="0.45"/>
  <rect x="202" y="420" width="168" height="58" rx="12" fill="#B8E6E1" opacity="0.92"/>
  <text x="286" y="452" font-family="sans-serif" font-size="14" font-weight="700" fill="#0A1628" text-anchor="middle">Amazon</text>
  <text x="286" y="470" font-family="sans-serif" font-size="12" fill="#0A1628" text-anchor="middle">15 items</text>

  <rect x="416" y="428" width="168" height="58" rx="12" fill="#B8E6E1" opacity="0.2"/>
  <rect x="412" y="424" width="168" height="58" rx="12" fill="#B8E6E1" opacity="0.45"/>
  <rect x="408" y="420" width="168" height="58" rx="12" fill="#B8E6E1" opacity="0.92"/>
  <text x="492" y="452" font-family="sans-serif" font-size="14" font-weight="700" fill="#0A1628" text-anchor="middle">Best Buy</text>
  <text x="492" y="470" font-family="sans-serif" font-size="12" fill="#0A1628" text-anchor="middle">12 items</text>

  <rect x="622" y="428" width="168" height="58" rx="12" fill="#B8E6E1" opacity="0.2"/>
  <rect x="618" y="424" width="168" height="58" rx="12" fill="#B8E6E1" opacity="0.45"/>
  <rect x="614" y="420" width="168" height="58" rx="12" fill="#B8E6E1" opacity="0.92"/>
  <text x="698" y="452" font-family="sans-serif" font-size="14" font-weight="700" fill="#0A1628" text-anchor="middle">Target</text>
  <text x="698" y="470" font-family="sans-serif" font-size="12" fill="#0A1628" text-anchor="middle">18 items</text>

  <rect x="828" y="428" width="168" height="58" rx="12" fill="#B8E6E1" opacity="0.2"/>
  <rect x="824" y="424" width="168" height="58" rx="12" fill="#B8E6E1" opacity="0.45"/>
  <rect x="820" y="420" width="168" height="58" rx="12" fill="#B8E6E1" opacity="0.92"/>
  <text x="904" y="452" font-family="sans-serif" font-size="14" font-weight="700" fill="#0A1628" text-anchor="middle">Walmart</text>
  <text x="904" y="470" font-family="sans-serif" font-size="12" fill="#0A1628" text-anchor="middle">22 items</text>

  <!-- Animated connector 3 -->
  <line x1="600" y1="516" x2="600" y2="562" stroke="#14B8A6" stroke-width="3" class="line-anim"/>

  <!-- Step 4: Constraint Filter -->
  <rect x="240" y="562" width="720" height="100" rx="18" fill="#1E2D45" stroke="#14B8A6" stroke-width="2"/>
  <text x="600" y="600" font-family="sans-serif" font-size="18" font-weight="700" fill="#14B8A6" text-anchor="middle">Constraint Filter</text>
  <text x="600" y="628" font-family="sans-serif" font-size="14" fill="#B8AFA0" text-anchor="middle">67 products  →  Budget  →  Delivery  →  Trust filter  →  14 matches</text>
  <text x="600" y="650" font-family="sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">All constraints satisfied</text>

  <!-- Animated connector 4 -->
  <line x1="600" y1="662" x2="600" y2="708" stroke="#F59E0B" stroke-width="3" class="line-anim"/>

  <!-- Step 5: Approval -->
  <rect x="200" y="708" width="800" height="88" rx="44" fill="#F59E0B"/>
  <text x="600" y="744" font-family="sans-serif" font-size="20" font-weight="700" fill="#0A1628" text-anchor="middle">Scoring Engine + Your Approval</text>
  <text x="600" y="774" font-family="sans-serif" font-size="15" fill="#0A1628" text-anchor="middle">Ranked by: Rating x Trust x Delivery x Price  —  Nothing happens until you say yes</text>

</svg>
