<svg width="980" height="340" viewBox="0 0 980 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .line-anim {
        stroke-dasharray: 8 5;
        animation: dash 2s linear infinite;
      }
      @keyframes dash {
        to { stroke-dashoffset: -26; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="#0A1628"/>

  <!-- Animated connectors between cards -->
  <line x1="230" y1="170" x2="270" y2="170" stroke="#2D3F5C" stroke-width="2" class="line-anim"/>
  <line x1="470" y1="170" x2="510" y2="170" stroke="#2D3F5C" stroke-width="2" class="line-anim"/>
  <line x1="710" y1="170" x2="750" y2="170" stroke="#2D3F5C" stroke-width="2" class="line-anim"/>

  <!-- Card 1: Precision -->
  <rect x="30" y="60" width="200" height="220" rx="18" fill="#1E2D45" stroke="#14B8A6" stroke-width="3"/>
  <rect x="30" y="60" width="200" height="6" rx="3" fill="#14B8A6"/>
  <text x="130" y="110" font-family="sans-serif" font-size="20" font-weight="700" fill="#14B8A6" text-anchor="middle">Precision</text>
  <text x="130" y="148" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">Hard constraints,</text>
  <text x="130" y="168" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">not soft preferences.</text>
  <text x="130" y="200" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">You say $120 —</text>
  <text x="130" y="220" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">it will never show $121.</text>
  <text x="130" y="258" font-family="sans-serif" font-size="12" font-weight="700" fill="#F59E0B" text-anchor="middle">Exact. Always.</text>

  <!-- Card 2: Trust -->
  <rect x="270" y="60" width="200" height="220" rx="18" fill="#1E2D45" stroke="#059669" stroke-width="3"/>
  <rect x="270" y="60" width="200" height="6" rx="3" fill="#059669"/>
  <text x="370" y="110" font-family="sans-serif" font-size="20" font-weight="700" fill="#059669" text-anchor="middle">Trust</text>
  <text x="370" y="148" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">Every recommendation</text>
  <text x="370" y="168" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">comes with a reason.</text>
  <text x="370" y="200" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">You always know why</text>
  <text x="370" y="220" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">an option was chosen.</text>
  <text x="370" y="258" font-family="sans-serif" font-size="12" font-weight="700" fill="#F59E0B" text-anchor="middle">Transparent. Always.</text>

  <!-- Card 3: Control -->
  <rect x="510" y="60" width="200" height="220" rx="18" fill="#1E2D45" stroke="#DC2626" stroke-width="3"/>
  <rect x="510" y="60" width="200" height="6" rx="3" fill="#DC2626"/>
  <text x="610" y="110" font-family="sans-serif" font-size="20" font-weight="700" fill="#DC2626" text-anchor="middle">Control</text>
  <text x="610" y="148" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">Nothing executes</text>
  <text x="610" y="168" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">without your approval.</text>
  <text x="610" y="200" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">The agent acts for you,</text>
  <text x="610" y="220" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">never instead of you.</text>
  <text x="610" y="258" font-family="sans-serif" font-size="12" font-weight="700" fill="#F59E0B" text-anchor="middle">Your call. Always.</text>

  <!-- Card 4: Speed -->
  <rect x="750" y="60" width="200" height="220" rx="18" fill="#1E2D45" stroke="#F59E0B" stroke-width="3"/>
  <rect x="750" y="60" width="200" height="6" rx="3" fill="#F59E0B"/>
  <text x="850" y="110" font-family="sans-serif" font-size="20" font-weight="700" fill="#F59E0B" text-anchor="middle">Speed</text>
  <text x="850" y="148" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">Machine-speed research,</text>
  <text x="850" y="168" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">human-speed decision.</text>
  <text x="850" y="200" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">7 open tabs reduced</text>
  <text x="850" y="220" font-family="sans-serif" font-size="13" fill="#B8AFA0" text-anchor="middle">to one clear screen.</text>
  <text x="850" y="258" font-family="sans-serif" font-size="12" font-weight="700" fill="#14B8A6" text-anchor="middle">Fast. Focused.</text>


</svg>
