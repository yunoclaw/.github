<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .line-anim {
        stroke-dasharray: 12 6;
        animation: dash 2s linear infinite;
      }
      .line-anim-rev {
        stroke-dasharray: 12 6;
        animation: dash-rev 2s linear infinite;
      }
      @keyframes dash {
        to { stroke-dashoffset: -36; }
      }
      @keyframes dash-rev {
        to { stroke-dashoffset: 36; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#0A1628"/>
  <rect x="10" y="10" width="1180" height="680" fill="none" stroke="#D97706" stroke-width="6" rx="14"/>

  <!-- Title -->
  <text x="600" y="58" font-family="sans-serif" font-size="30" font-weight="700" fill="#F6F1E8" text-anchor="middle">YunoClaw Architecture</text>

  <!-- Left inputs -->
  <rect x="50" y="178" width="220" height="68" rx="34" fill="#C96A2B"/>
  <text x="160" y="218" font-family="sans-serif" font-size="17" font-weight="700" fill="#0A1628" text-anchor="middle">Your Intent</text>

  <rect x="50" y="278" width="220" height="68" rx="34" fill="#C96A2B"/>
  <text x="160" y="318" font-family="sans-serif" font-size="17" font-weight="700" fill="#0A1628" text-anchor="middle">Budget Rules</text>

  <rect x="50" y="378" width="220" height="68" rx="34" fill="#C96A2B"/>
  <text x="160" y="418" font-family="sans-serif" font-size="17" font-weight="700" fill="#0A1628" text-anchor="middle">Preferences</text>

  <!-- Animated curved paths left to center -->
  <path d="M 270 212 Q 400 212 470 278" fill="none" stroke="#C96A2B" stroke-width="3" class="line-anim"/>
  <path d="M 270 312 Q 360 312 470 320" fill="none" stroke="#C96A2B" stroke-width="3" class="line-anim"/>
  <path d="M 270 412 Q 400 380 470 358" fill="none" stroke="#C96A2B" stroke-width="3" class="line-anim"/>

  <!-- Center agent -->
  <circle cx="600" cy="318" r="148" fill="none" stroke="#14B8A6" stroke-width="2" stroke-dasharray="8 5" opacity="0.3"/>
  <rect x="468" y="248" width="264" height="140" rx="18" fill="#1E2D45" stroke="#14B8A6" stroke-width="3"/>

  <!-- YunoClaw logo -->
  <g transform="translate(548, 262) scale(3.2)">
    <path d="M16 22 C16 22 7 20 6 13 C5 7 9 4 12 5 C14 5.5 14.5 7 13.5 9 C12.5 11 12 13 13 15 C14 17 16 18 16 22 Z" fill="#14B8A6"/>
    <path d="M16 22 C16 22 25 20 26 13 C27 7 23 4 20 5 C18 5.5 17.5 7 18.5 9 C19.5 11 20 13 19 15 C18 17 16 18 16 22 Z" fill="#14B8A6"/>
    <path d="M11 24 C11 21.8 13.2 20 16 20 C18.8 20 21 21.8 21 24 C21 26.2 18.8 28 16 28 C13.2 28 11 26.2 11 24 Z" fill="#14B8A6"/>
  </g>
  <text x="600" y="372" font-family="sans-serif" font-size="19" font-weight="700" fill="#F6F1E8" text-anchor="middle">YunoClaw Agent</text>

  <!-- Animated line agent to tools -->
  <line x1="600" y1="388" x2="600" y2="520" stroke="#14B8A6" stroke-width="3" class="line-anim"/>

  <!-- Tools section -->
  <rect x="370" y="520" width="460" height="118" rx="18" fill="#1E2D45" stroke="#0F766E" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="600" y="554" font-family="sans-serif" font-size="17" font-weight="700" fill="#14B8A6" text-anchor="middle">Tools</text>

  <rect x="390" y="568" width="130" height="44" rx="22" fill="#DC8B6B"/>
  <text x="455" y="595" font-family="sans-serif" font-size="14" font-weight="700" fill="#0A1628" text-anchor="middle">Search API</text>

  <rect x="535" y="568" width="130" height="44" rx="22" fill="#DC8B6B"/>
  <text x="600" y="595" font-family="sans-serif" font-size="14" font-weight="700" fill="#0A1628" text-anchor="middle">Merchants</text>

  <rect x="680" y="568" width="130" height="44" rx="22" fill="#DC8B6B"/>
  <text x="745" y="595" font-family="sans-serif" font-size="14" font-weight="700" fill="#0A1628" text-anchor="middle">Database</text>

  <!-- Right outputs -->
  <rect x="930" y="178" width="220" height="68" rx="34" fill="#14B8A6"/>
  <text x="1040" y="218" font-family="sans-serif" font-size="17" font-weight="700" fill="#0A1628" text-anchor="middle">Ranked Results</text>

  <rect x="930" y="278" width="220" height="68" rx="34" fill="#14B8A6"/>
  <text x="1040" y="318" font-family="sans-serif" font-size="17" font-weight="700" fill="#0A1628" text-anchor="middle">Explanations</text>

  <rect x="930" y="378" width="220" height="68" rx="34" fill="#14B8A6"/>
  <text x="1040" y="418" font-family="sans-serif" font-size="17" font-weight="700" fill="#0A1628" text-anchor="middle">Approval Gate</text>

  <!-- Animated curved paths center to right -->
  <path d="M 732 278 Q 860 212 930 212" fill="none" stroke="#14B8A6" stroke-width="3" class="line-anim-rev"/>
  <path d="M 732 318 Q 820 312 930 312" fill="none" stroke="#14B8A6" stroke-width="3" class="line-anim-rev"/>
  <path d="M 732 358 Q 860 380 930 412" fill="none" stroke="#14B8A6" stroke-width="3" class="line-anim-rev"/>

  <!-- Tagline -->
  <text x="600" y="668" font-family="sans-serif" font-size="15" fill="#B8AFA0" text-anchor="middle">Machine speed research  |  Human decision control</text>

</svg>
